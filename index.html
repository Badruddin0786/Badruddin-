<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AESHA 3D ULTRA HD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #1a1a1a, #000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            perspective: 1000px; /* 3D effect ke liye */
        }

        /* 3D Moving Background Lights */
        .bg-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(from 180deg at 50% 50%, #ffea00, #ff00cc, #00dbde, #ffea00);
            animation: rotateGlow 10s linear infinite;
            opacity: 0.1;
            filter: blur(80px);
            z-index: 0;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* The 3D Glass Container */
        .glass-container {
            position: relative;
            z-index: 10;
            width: 88%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 50px;
            padding: 50px 30px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            border-left: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 20px 20px 50px rgba(0,0,0,0.5), 
                        inset 5px 5px 20px rgba(255,255,255,0.1);
            transform: rotateX(10deg); /* 3D Tilt */
            text-align: center;
        }

        .title-hd {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, #ffea00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 234, 0, 0.8));
        }

        /* Premium 3D Buttons */
        .btn-3d {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            margin: 25px 0;
            padding: 20px;
            border-radius: 25px;
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Button Click Animation & Color */
        .btn-3d:active {
            transform: scale(0.9) translateY(5px);
            background: rgba(255, 234, 0, 0.8); /* Yellow Flash */
            color: #000;
            box-shadow: 0 0 50px #ffea00;
        }

        .btn-3d img {
            width: 35px;
            margin-right: 15px;
            filter: drop-shadow(0 0 5px white);
        }

        /* Floating Particle Effect */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-container">
        <h1 class="title-hd">AESHA</h1>

        <a href="intent://instagram.com/_u/aesha9545/#Intent;package=com.instagram.android;scheme=https;end" class="btn-3d" onclick="playBeep(event)">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"> Instagram
        </a>

        <a href="https://whatsapp.com/channel/0029Vb6fkyx3LdQWUSGdgz0Y" class="btn-3d" onclick="playBeep(event)">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"> WhatsApp
        </a>

        <a href="https://www.facebook.com/share/1AzSuNmDBC/" class="btn-3d" onclick="playBeep(event)">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"> Facebook
        </a>
    </div>

    <audio id="clickSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/button-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playBeep(e) {
            var snd = document.getElementById("clickSound");
            snd.currentTime = 0; // Reset sound for fast clicks
            snd.play().catch(function(error) {
                console.log("Audio play failed:", error);
            });
            
            // Vibrating effect for real feel
            if (navigator.vibrate) {
                navigator.vibrate(70);
            }
        }
    </script>

</body>
</html>
